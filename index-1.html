<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0A1628">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="LifePlanner">
<link rel="manifest" href="manifest.json">
<title>Vikram's Life Planner</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --navy:#0F2D5E;--gold:#F5A623;--teal:#00C9A7;
  --cream:#F8F6F1;--dark:#0A1628;--mid:#1A3A6E;
  --text:#1C1C2E;--muted:#6B7A99;--red:#E8504A;
  --purple:#7C3AED;--border:#E4E9F2;--white:#FFFFFF;
  --safe-b:env(safe-area-inset-bottom,0px);
  --safe-t:env(safe-area-inset-top,0px);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;}
body{font-family:'DM Sans',sans-serif;background:var(--dark);color:var(--text);display:flex;flex-direction:column;}

/* HEADER */
.header{background:linear-gradient(135deg,var(--dark) 0%,#0F2D5E 100%);color:white;padding:12px 18px 10px;padding-top:calc(12px + var(--safe-t));flex-shrink:0;position:relative;overflow:hidden;}
.header::before{content:'';position:absolute;top:-50px;right:-30px;width:180px;height:180px;border-radius:50%;background:radial-gradient(circle,rgba(245,166,35,.15),transparent 70%);pointer-events:none;}
.header-row{display:flex;justify-content:space-between;align-items:center;position:relative;z-index:1;}
.brand{font-size:8px;letter-spacing:3px;text-transform:uppercase;color:var(--gold);margin-bottom:2px;opacity:.8;}
.header h1{font-family:'Playfair Display',serif;font-size:1.2rem;font-weight:700;}
.header h1 span{color:var(--gold);}
.date-chip{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);border-radius:9px;padding:6px 11px;text-align:right;}
.dc-day{font-size:8px;color:var(--teal);letter-spacing:1.5px;text-transform:uppercase;}
.dc-date{font-family:'DM Mono',monospace;font-size:11px;font-weight:500;}

/* COUNTDOWN BAR */
.cd-bar{background:rgba(0,0,0,.3);padding:8px 14px;display:flex;gap:8px;overflow-x:auto;scrollbar-width:none;flex-shrink:0;border-bottom:1px solid rgba(255,255,255,.06);}
.cd-bar::-webkit-scrollbar{display:none;}
.cd-pill{display:flex;align-items:center;gap:8px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:10px;padding:6px 12px;flex-shrink:0;}
.cd-icon{font-size:14px;}
.cd-label{font-size:8px;color:rgba(255,255,255,.45);letter-spacing:.8px;text-transform:uppercase;white-space:nowrap;}
.cd-days{font-family:'DM Mono',monospace;font-size:15px;font-weight:600;color:var(--gold);line-height:1;}
.cd-sub{font-size:8px;color:rgba(255,255,255,.35);white-space:nowrap;}

/* SCROLL AREA */
.scroll-area{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;background:var(--cream);padding-bottom:calc(68px + var(--safe-b));}
.main{padding:14px 12px 8px;}
.section{display:none;}
.section.active{display:block;animation:fadeUp .3s ease both;}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
.sec-title{font-family:'Playfair Display',serif;font-size:.95rem;color:var(--navy);margin-bottom:11px;display:flex;align-items:center;gap:8px;}
.sec-title::after{content:'';flex:1;height:1.5px;background:linear-gradient(to right,var(--border),transparent);}
.card{background:white;border-radius:14px;border:1px solid var(--border);box-shadow:0 2px 10px rgba(15,45,94,.05);margin-bottom:12px;overflow:hidden;}

/* BOTTOM NAV */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:white;border-top:1px solid var(--border);display:flex;padding-bottom:var(--safe-b);z-index:100;box-shadow:0 -4px 20px rgba(15,45,94,.08);}
.nav-btn{flex:1;border:none;background:none;padding:9px 4px 7px;display:flex;flex-direction:column;align-items:center;gap:2px;cursor:pointer;transition:all .2s;font-family:'DM Sans',sans-serif;}
.nav-icon{font-size:19px;transition:transform .2s;}
.nav-label{font-size:9px;font-weight:700;letter-spacing:.7px;text-transform:uppercase;color:var(--muted);transition:color .2s;}
.nav-btn.active .nav-label{color:var(--navy);}
.nav-btn.active .nav-icon{transform:scale(1.18);}
.nav-dot{width:4px;height:4px;border-radius:50%;background:var(--gold);margin-top:1px;opacity:0;transition:opacity .2s;}
.nav-btn.active .nav-dot{opacity:1;}

/* TOAST */
.toast{position:fixed;bottom:calc(74px + var(--safe-b));left:50%;transform:translateX(-50%) translateY(20px);background:var(--navy);color:white;padding:9px 18px;border-radius:100px;font-size:12px;font-weight:600;border:1px solid rgba(245,166,35,.4);opacity:0;transition:all .3s cubic-bezier(.34,1.56,.64,1);z-index:200;white-space:nowrap;pointer-events:none;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* ── WEEKLY ── */
.week-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px;}
.stat-box{background:white;border-radius:12px;border:1px solid var(--border);padding:11px;text-align:center;}
.stat-val{font-family:'DM Mono',monospace;font-size:1.35rem;font-weight:700;line-height:1;}
.stat-label{font-size:9px;color:var(--muted);margin-top:2px;text-transform:uppercase;letter-spacing:.4px;}
.bar-chart-wrap{padding:14px;}
.bar-chart-title{font-size:10px;font-weight:700;color:var(--navy);letter-spacing:.5px;text-transform:uppercase;margin-bottom:10px;}
.bar-chart{display:flex;align-items:flex-end;gap:5px;height:90px;margin-bottom:5px;}
.bar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;}
.bar-wrap{flex:1;width:100%;display:flex;align-items:flex-end;background:#F1F5F9;border-radius:5px;overflow:hidden;}
.bar{width:100%;border-radius:5px;transition:height .7s cubic-bezier(.34,1.2,.64,1);}
.bar-val{font-family:'DM Mono',monospace;font-size:9px;color:var(--muted);}
.bar-day{font-size:9px;font-weight:700;color:var(--muted);}
.bar-day.today{color:var(--navy);font-weight:900;}
.focus-scroll{display:flex;gap:9px;overflow-x:auto;scrollbar-width:none;padding:0 12px 12px;}
.focus-scroll::-webkit-scrollbar{display:none;}
.focus-card{min-width:115px;flex-shrink:0;background:white;border-radius:12px;border:1.5px solid var(--border);overflow:hidden;box-shadow:0 2px 6px rgba(15,45,94,.04);}
.focus-card.today{border-color:var(--gold);box-shadow:0 0 0 2px rgba(245,166,35,.2);}
.fc-head{padding:7px 10px;font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;display:flex;justify-content:space-between;}
.fc-body{padding:8px 10px;}
.fc-item{font-size:10px;padding:2.5px 0;border-bottom:1px dashed #F1F5F9;display:flex;align-items:center;gap:5px;}
.fc-item:last-child{border-bottom:none;}
.fc-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0;}

/* ── MONTHLY ── */
.rings-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:12px;}
.ring-card{background:white;border-radius:13px;border:1px solid var(--border);padding:14px;display:flex;flex-direction:column;align-items:center;box-shadow:0 2px 8px rgba(15,45,94,.04);}
.ring-label{font-family:'Playfair Display',serif;font-size:11px;color:var(--navy);margin-top:7px;text-align:center;font-weight:700;}
.ring-sub{font-size:9px;color:var(--muted);text-align:center;margin-top:2px;}
.heatmap-wrap{padding:13px;}
.heatmap-title{font-size:10px;font-weight:700;color:var(--navy);text-transform:uppercase;letter-spacing:.5px;margin-bottom:9px;display:flex;justify-content:space-between;align-items:center;}
.heatmap-nav{display:flex;gap:5px;}
.hm-btn{background:none;border:1.5px solid var(--border);border-radius:6px;padding:2px 8px;font-size:11px;font-weight:700;cursor:pointer;color:var(--navy);transition:all .15s;}
.hm-btn:active{background:var(--navy);color:white;border-color:var(--navy);}
.heatmap-days{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:4px;}
.hm-day-label{font-size:8px;color:var(--muted);text-align:center;font-weight:700;}
.heatmap-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;}
.hm-cell{aspect-ratio:1;border-radius:3px;transition:transform .15s;}
.hm-cell:active{transform:scale(.8);}
.hm-cell.empty{background:transparent;pointer-events:none;}
.hm-cell.level-0{background:#F1F5F9;}
.hm-cell.level-1{background:#B3F0E6;}
.hm-cell.level-2{background:#66DFD0;}
.hm-cell.level-3{background:#00C9A7;}
.hm-cell.level-4{background:#009E82;}
.hm-cell.today-cell{outline:2px solid var(--gold);outline-offset:1px;}
.heatmap-legend{display:flex;align-items:center;gap:4px;font-size:9px;color:var(--muted);margin-top:7px;}
.hm-leg{width:9px;height:9px;border-radius:2px;}
.timeline{padding:13px;}
.tl-item{display:flex;gap:9px;margin-bottom:0;}
.tl-left{display:flex;flex-direction:column;align-items:center;width:32px;flex-shrink:0;}
.tl-dot{width:11px;height:11px;border-radius:50%;flex-shrink:0;margin-top:3px;border:2px solid white;box-shadow:0 0 0 2px currentColor;}
.tl-line{flex:1;width:2px;background:var(--border);margin:3px 0;}
.tl-item:last-child .tl-line{display:none;}
.tl-right{padding-bottom:12px;}
.tl-month{font-family:'DM Mono',monospace;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;margin-bottom:2px;}
.tl-tasks{font-size:11px;color:var(--text);line-height:1.5;}
.tl-item.past .tl-dot{background:var(--teal)!important;color:var(--teal);}
.tl-item.now .tl-dot{animation:pulse 1.5s infinite;}
@keyframes pulse{0%,100%{box-shadow:0 0 0 2px currentColor,0 0 0 4px transparent;}50%{box-shadow:0 0 0 2px currentColor,0 0 0 6px rgba(245,166,35,.3);}}

/* ── YEARLY ── */
.year-arc-wrap{padding:14px;display:flex;align-items:center;gap:14px;}
.year-goal-bars{flex:1;}
.yg-row{margin-bottom:10px;}
.yg-head{display:flex;justify-content:space-between;margin-bottom:3px;}
.yg-name{font-size:11px;font-weight:600;color:var(--navy);}
.yg-pct{font-family:'DM Mono',monospace;font-size:10px;font-weight:700;}
.yg-track{background:#F1F5F9;border-radius:100px;height:6px;overflow:hidden;}
.yg-fill{height:100%;border-radius:100px;transition:width 1s ease;}
.quarters{display:grid;grid-template-columns:repeat(2,1fr);gap:9px;margin-bottom:12px;}
.q-card{background:white;border-radius:12px;border:1px solid var(--border);padding:12px;box-shadow:0 2px 6px rgba(15,45,94,.04);}
.q-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:7px;}
.q-label{font-family:'DM Mono',monospace;font-size:9px;font-weight:700;}
.q-score{font-family:'DM Mono',monospace;font-size:10px;font-weight:700;}
.q-bars{display:flex;flex-direction:column;gap:4px;}
.qb-row{display:flex;align-items:center;gap:5px;}
.qb-name{font-size:9px;color:var(--muted);width:16px;flex-shrink:0;text-align:center;}
.qb-track{flex:1;background:#F1F5F9;border-radius:100px;height:5px;overflow:hidden;}
.qb-fill{height:100%;border-radius:100px;transition:width .8s ease;}
.sy-wrap{padding:12px;}
.sy-title{font-size:10px;font-weight:700;color:var(--navy);text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px;}
.sy-row{display:flex;gap:2px;align-items:center;margin-bottom:4px;}
.sy-label{font-size:9px;color:var(--muted);width:22px;flex-shrink:0;}
.sy-cells{display:flex;gap:1.5px;flex:1;overflow:hidden;}
.sy-cell{flex:1;height:9px;border-radius:2px;min-width:0;}

/* ── STATS TAB ── */
.stats-section-title{font-size:10px;font-weight:700;color:var(--navy);text-transform:uppercase;letter-spacing:.8px;margin:14px 0 8px;display:flex;align-items:center;gap:6px;}
.stats-section-title::after{content:'';flex:1;height:1px;background:var(--border);}

/* Animated counters row */
.counter-row{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:4px;}
.counter-card{background:white;border-radius:13px;border:1px solid var(--border);padding:13px 12px;display:flex;align-items:center;gap:10px;box-shadow:0 2px 8px rgba(15,45,94,.04);}
.counter-icon{font-size:22px;flex-shrink:0;}
.counter-val{font-family:'DM Mono',monospace;font-size:1.5rem;font-weight:900;line-height:1;}
.counter-label{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-top:1px;}
.counter-sub{font-size:9px;font-weight:700;margin-top:2px;}

/* Habit bar chart */
.hbc-wrap{padding:14px;}
.hbc-title{font-size:10px;font-weight:700;color:var(--navy);text-transform:uppercase;letter-spacing:.5px;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center;}
.hbc-legend{display:flex;gap:6px;flex-wrap:wrap;}
.hbc-leg{display:flex;align-items:center;gap:3px;font-size:8px;color:var(--muted);}
.hbc-leg-dot{width:7px;height:7px;border-radius:2px;}
.hbc-bars{display:flex;flex-direction:column;gap:7px;}
.hbc-row{display:flex;align-items:center;gap:8px;}
.hbc-name{font-size:10px;color:var(--text);width:72px;flex-shrink:0;display:flex;align-items:center;gap:4px;white-space:nowrap;overflow:hidden;}
.hbc-track{flex:1;background:#F1F5F9;border-radius:100px;height:14px;overflow:hidden;position:relative;}
.hbc-fill{height:100%;border-radius:100px;display:flex;align-items:center;justify-content:flex-end;padding-right:5px;min-width:14px;transition:width 1s cubic-bezier(.34,1.2,.64,1);}
.hbc-fill span{font-family:'DM Mono',monospace;font-size:8px;font-weight:700;color:white;white-space:nowrap;}
.hbc-pct{font-family:'DM Mono',monospace;font-size:9px;color:var(--muted);width:28px;text-align:right;flex-shrink:0;}

/* Donut rings */
.donuts-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:9px;}
.donut-card{background:white;border-radius:13px;border:1px solid var(--border);padding:13px;display:flex;align-items:center;gap:10px;box-shadow:0 2px 8px rgba(15,45,94,.04);}
.donut-info{flex:1;min-width:0;}
.donut-name{font-size:11px;font-weight:700;color:var(--navy);margin-bottom:1px;}
.donut-sub{font-size:9px;color:var(--muted);}
.donut-days{font-family:'DM Mono',monospace;font-size:11px;font-weight:700;margin-top:3px;}

/* Heatmap in stats */
.stat-hm-wrap{padding:12px 14px;}
.stat-hm-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
.stat-hm-title{font-size:10px;font-weight:700;color:var(--navy);text-transform:uppercase;letter-spacing:.5px;}
.stat-hm-nav{display:flex;gap:4px;align-items:center;}
.stat-hm-month{font-family:'DM Mono',monospace;font-size:10px;color:var(--navy);min-width:60px;text-align:center;}
.shm-btn{background:none;border:1.5px solid var(--border);border-radius:6px;padding:2px 8px;font-size:12px;font-weight:700;cursor:pointer;color:var(--navy);}
.shm-btn:active{background:var(--navy);color:white;}
.stat-hm-days{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:3px;}
.stat-hm-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;}
.shm-cell{aspect-ratio:1;border-radius:3px;transition:transform .12s;}
.shm-cell:active{transform:scale(.8);}
.shm-cell.empty{background:transparent;pointer-events:none;}
.shm-cell.l0{background:#F1F5F9;} .shm-cell.l1{background:#B3F0E6;} .shm-cell.l2{background:#66DFD0;} .shm-cell.l3{background:#00C9A7;} .shm-cell.l4{background:#009E82;}
.shm-cell.tc{outline:2px solid var(--gold);outline-offset:1px;}
.shm-legend{display:flex;align-items:center;gap:4px;font-size:8px;color:var(--muted);margin-top:7px;}
.shm-leg{width:8px;height:8px;border-radius:2px;}

/* ── HABITS ── */
.score-banner{background:linear-gradient(135deg,var(--navy),#1A3A6E);border-radius:14px;padding:14px;margin-bottom:12px;display:flex;align-items:center;gap:14px;color:white;}
.score-info h3{font-family:'Playfair Display',serif;font-size:.95rem;color:white;margin-bottom:2px;}
.score-info p{font-size:11px;color:rgba(255,255,255,.6);line-height:1.5;}
.score-num{font-family:'DM Mono',monospace;font-size:1.4rem;font-weight:700;color:var(--gold);}
.habit-card{background:white;border-radius:13px;border:1px solid var(--border);padding:13px;margin-bottom:10px;box-shadow:0 2px 8px rgba(15,45,94,.04);}
.habit-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:9px;}
.habit-left{display:flex;align-items:center;gap:9px;}
.habit-emoji{font-size:20px;}
.habit-name{font-size:12px;font-weight:700;color:var(--navy);}
.habit-freq{font-size:9px;color:var(--muted);}
.streak-chip{font-family:'DM Mono',monospace;font-size:10px;font-weight:700;padding:3px 9px;border-radius:100px;}
.habit-spark{margin:6px 0 9px;height:26px;width:100%;}
.week-dots{display:flex;gap:4px;margin-bottom:10px;}
.wd{flex:1;height:30px;border-radius:7px;border:1.5px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:700;color:var(--muted);cursor:pointer;transition:all .15s;user-select:none;-webkit-user-select:none;}
.wd.done{border-color:transparent;color:white;}
.wd:active:not(.future){transform:scale(.85);}
.wd.future{opacity:.3;pointer-events:none;}
.check-btn{width:100%;padding:10px;border-radius:10px;border:1.5px solid var(--border);background:white;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:700;cursor:pointer;transition:all .2s;color:var(--muted);}
.check-btn.done{background:var(--teal);border-color:var(--teal);color:white;}
.check-btn:active{transform:scale(.97);}
</style>
</head>
<body>

<div class="header">
  <div class="header-row">
    <div><div class="brand">FinSheet by Angiras</div><h1>Vikram's <span>Life Planner</span></h1></div>
    <div class="date-chip"><div class="dc-day" id="hdrDay"></div><div class="dc-date" id="hdrDate"></div></div>
  </div>
</div>

<div class="cd-bar">
  <div class="cd-pill"><div class="cd-icon">🏃</div><div><div class="cd-label">Marathon</div><div class="cd-days" id="cd1">—</div><div class="cd-sub">days · Sep 17</div></div></div>
  <div class="cd-pill"><div class="cd-icon">📺</div><div><div class="cd-label">10K Subs</div><div class="cd-days" id="cd2">—</div><div class="cd-sub">days · Mar '27</div></div></div>
  <div class="cd-pill"><div class="cd-icon">📚</div><div><div class="cd-label">3 Books</div><div class="cd-days" id="cd3">—</div><div class="cd-sub">days · Sep 17</div></div></div>
  <div class="cd-pill"><div class="cd-icon">📈</div><div><div class="cd-label">20% XIRR</div><div class="cd-days" id="cd4">—</div><div class="cd-sub">days · Dec 31</div></div></div>
</div>

<div class="scroll-area"><div class="main">

<!-- WEEKLY -->
<div class="section active" id="weekly">
  <div class="sec-title">🗓️ This Week</div>
  <div class="week-stats">
    <div class="stat-box"><div class="stat-val" id="wk-done" style="color:var(--teal)">0</div><div class="stat-label">Habits Done</div></div>
    <div class="stat-box"><div class="stat-val" id="wk-streak" style="color:var(--gold)">0d</div><div class="stat-label">Best Streak</div></div>
    <div class="stat-box"><div class="stat-val" id="wk-pct" style="color:var(--purple)">0%</div><div class="stat-label">Week Score</div></div>
  </div>
  <div class="card">
    <div class="bar-chart-wrap">
      <div class="bar-chart-title">Daily Habit Completions</div>
      <div class="bar-chart" id="barChart"></div>
      <div style="display:flex;justify-content:space-between;font-size:9px;color:var(--muted);padding:0 2px;"><span>0</span><span id="barMax"></span></div>
    </div>
  </div>
  <div class="sec-title">Daily Focus</div>
  <div class="focus-scroll" id="focusScroll"></div>
</div>

<!-- MONTHLY -->
<div class="section" id="monthly">
  <div class="sec-title">📆 Goal Progress</div>
  <div class="rings-grid" id="ringsGrid"></div>
  <div class="card"><div class="heatmap-wrap">
    <div class="heatmap-title">
      <span id="hmTitle">Habit Heatmap</span>
      <div class="heatmap-nav"><button class="hm-btn" onclick="changeHmMonth(-1)">‹</button><button class="hm-btn" onclick="changeHmMonth(1)">›</button></div>
    </div>
    <div class="heatmap-days" id="hmDays"></div>
    <div class="heatmap-grid" id="hmGrid"></div>
    <div class="heatmap-legend"><s
